<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Knightmare — survive the board</title>
  <meta name="description" content="A survival arcade game: dodge chess-piece hazards on an escalating 6×6 board. How many waves can you outlast?" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♞</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <header class="hud">
    <h1>Knightmare</h1>
    <div class="stats">
      <div><span>WAVE</span><b id="wave">0</b></div>
      <div><span>BEST</span><b id="best">0</b></div>
    </div>
  </header>

  <div class="dpad">
    <button data-dir="up">▲</button>
    <div class="mid"><button data-dir="left">◀</button><button data-dir="right">▶</button></div>
    <button data-dir="down">▼</button>
  </div>

  <div class="overlay" id="overlay">
    <h2 id="ovtitle">Knightmare</h2>
    <p id="ovscore">Dodge the chess-piece hazards. Move off the warned squares before they strike.</p>
    <div id="board" class="leaderboard"></div>
    <button id="startbtn" class="start">Play</button>
    <p class="keys">Move with <b>WASD / arrows</b> · swipe or tap arrows on touch</p>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
